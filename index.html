<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arthae' Fashion</title>
  <meta name="description"
    content="Prototype website e-commerce fashion dengan katalog produk, keranjang, checkout, dan dashboard admin.">
  <link rel="stylesheet" href="css/tampilan-awal.css">
</head>

<body>
  <section class="welcome-page">
    <div class="welcome-panel">
      <p class="eyebrow">Fashion E-Commerce</p>
      <h1>Arthae'</h1>
      <p class="welcome-copy">Koleksi outfit modern untuk kuliah, kerja, hangout, dan acara spesial.</p>
      <form id="welcomeLoginForm" class="welcome-login">
        <input id="welcomeName" type="text" placeholder="Nama pembeli" required>
        <input id="welcomePhone" type="tel" placeholder="Nomor WhatsApp" required>
        <button class="primary-btn" type="submit">Login Pembeli</button>
      </form>
      <div class="welcome-actions">
        <a class="ghost-btn link-btn" href="admin.html">Masuk Sebagai Admin</a>
      </div>
    </div>
  </section>
  <script src="js/app.js"></script>
</body>

</html>
